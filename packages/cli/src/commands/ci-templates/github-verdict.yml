name: OpenCodeHub Verdict
on: [pull_request]
jobs:
  verdict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g @opencodehub/cli@latest
      - run: codehub analyze
      - name: verdict
        id: verdict
        run: |
          codehub verdict --base origin/${MAIN_BRANCH} --head HEAD > /tmp/verdict.md || true
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
      - run: gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/verdict.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: exit ${{ steps.verdict.outputs.exit_code }}
