[project]
name = "opencodehub-eval"
version = "0.0.0"
description = "OpenCodeHub — parity and regression eval harness"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = [
    "pytest>=8.3.0",
    "mcp>=1.0.0",
    "anyio>=4.5.0",
    "rich>=13.7.0",
]

[tool.pytest.ini_options]
# anyio ships a pytest plugin that is picked up automatically; async tests
# annotated with @pytest.mark.anyio run under the backend chosen by the
# `anyio_backend` fixture (asyncio, declared in conftest.py).
# pytest-timeout caps any hung MCP interaction; 60 s is generous for 49
# sequential subprocess spawns on a busy laptop.
timeout = 60
markers = [
  "anyio: mark test to run under the anyio pytest plugin",
]

[tool.uv]
package = true

[tool.ruff]
line-length = 100
target-version = "py312"

[dependency-groups]
dev = [
    "pytest-timeout>=2.4.0",
]
