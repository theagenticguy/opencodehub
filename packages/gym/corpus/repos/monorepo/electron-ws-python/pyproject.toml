[project]
name = "electron-ws-python-backend"
version = "0.0.0"
description = "Python WebSocket backend for the Electron fixture. Source-only; never installed."
requires-python = ">=3.12"
dependencies = [
  "websockets>=13.0",
  "pydantic>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["backend"]
