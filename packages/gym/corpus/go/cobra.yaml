  # ---------- implementations (2) ----------

  - id: cobra.implementations.PositionalArgs
    kind: implementations
    target:
      symbolName: PositionalArgs
      file: args.go
      line: 22
      column: 6
    expected:
      - file: args.go
        line: 28
        column: 6
        enclosing: legacyArgs
      - file: args.go
        line: 42
        column: 6
        enclosing: NoArgs
      - file: args.go
        line: 51
        column: 6
        enclosing: OnlyValidArgs
      - file: args.go
        line: 69
        column: 6
        enclosing: ArbitraryArgs
    labeler: opus-4-7
    labeler_note: |
      PositionalArgs is a function type (args.go:22). gopls reports top-level named
      functions with the matching signature func(cmd *Command, args []string) error
      as implementations. The four such functions in the cobra root package are
      legacyArgs, NoArgs, OnlyValidArgs, and ArbitraryArgs — all in args.go. The
      factory funcs (MinimumNArgs, ExactArgs, RangeArgs, MatchAll, ExactValidArgs)
      RETURN PositionalArgs rather than having that signature themselves, so they
      are excluded. Tests and _examples/ are out of scope per the task boundaries.

  - id: cobra.implementations.SliceValue
    kind: implementations
    target:
      symbolName: SliceValue
      file: completions.go
      line: 304
      column: 6
    expected: []
    waived: true
    labeler: opus-4-7
    labeler_note: |
      SliceValue is a minimal in-cobra mirror of pflag.SliceValue used only for a
      type-assertion at completions.go:438. No type inside the cobra package
      implements it; the real implementations live in spf13/pflag (vendored/module
      cache), which is outside the fixture submodule. Waived until we wire pflag
      into the fixture or decide how to encode external-dependency impls.

