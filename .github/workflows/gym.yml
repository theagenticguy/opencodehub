name: Gym

# SCIP-indexer gym: replays the reference-graph corpus through each
# language's native SCIP indexer (scip-python, scip-typescript, scip-go,
# rust-analyzer --scip, scip-java) and gates regression against the
# baseline manifest at packages/gym/baselines/manifest.jsonl.
#
# One job per language (matrix) plus a monorepo job that exercises the
# in-tree electron-ws-python fixture. Indexer binaries are cached per
# language + OS + version key.
#
# See docs/adr/0005-scip-replaces-lsp.md for the migration rationale
# and docs/adr/0006-scip-indexer-pins.md for the version pin table.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Pinned SCIP-indexer versions. Bumping requires regenerating
  # packages/gym/baselines/manifest.jsonl via `mise run gym:baseline`.
  SCIP_TYPESCRIPT_VERSION: "0.4.0"
  SCIP_PYTHON_VERSION: "0.6.6"
  SCIP_GO_VERSION: "v0.2.3"
  SCIP_JAVA_VERSION: "0.12.3"
  RUST_ANALYZER_CHANNEL: "stable"

jobs:
  gym-matrix:
    name: gym (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        language: [python, typescript, go, rust]
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout (with fixture submodules)
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install mise-managed toolchain (node, pnpm, python, uv)
        uses: jdx/mise-action@v4

      - name: Install node-gyp on PATH
        run: npm install -g node-gyp@11

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      # ---- Per-language SCIP indexer installs --------------------------

      - name: Install scip-python
        if: matrix.language == 'python'
        run: npm install -g @sourcegraph/scip-python@${{ env.SCIP_PYTHON_VERSION }}

      - name: Install scip-typescript
        if: matrix.language == 'typescript'
        run: npm install -g @sourcegraph/scip-typescript@${{ env.SCIP_TYPESCRIPT_VERSION }}

      - name: Set up Go toolchain
        if: matrix.language == 'go'
        uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          cache: true

      - name: Cache scip-go binary
        if: matrix.language == 'go'
        id: cache-scip-go
        uses: actions/cache@v4
        with:
          path: ~/go/bin
          key: scip-go-${{ runner.os }}-${{ env.SCIP_GO_VERSION }}

      - name: Install scip-go
        if: matrix.language == 'go' && steps.cache-scip-go.outputs.cache-hit != 'true'
        # Project moved from sourcegraph/scip-go to scip-code/scip-go
        # upstream (go.mod now declares the new path). The GitHub repo
        # at sourcegraph/scip-go redirects but `go install` resolves
        # module-path mismatches the hard way, so we use the canonical
        # scip-code/ path here and let Go's module cache follow.
        run: go install github.com/scip-code/scip-go/cmd/scip-go@${{ env.SCIP_GO_VERSION }}

      - name: Add Go bin to PATH
        if: matrix.language == 'go'
        run: echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Set up Rust toolchain (stable + rust-analyzer)
        if: matrix.language == 'rust'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rust-analyzer

      - name: Cache cargo registry
        if: matrix.language == 'rust'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-${{ runner.os }}-${{ hashFiles('packages/gym/corpus/repos/rust/**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Cache pip wheels
        if: matrix.language == 'python'
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('packages/gym/corpus/repos/python/**/pyproject.toml', 'packages/gym/corpus/repos/python/**/requirements*.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install Python fixture dependencies
        if: matrix.language == 'python'
        # scip-python shells to `pip` to resolve installed package
        # names and versions; the fixture repos need their deps
        # installed before indexing. Use a single shared venv so
        # scip-python can see every fixture's dep set.
        run: |
          python -m venv /tmp/gym-py-venv
          . /tmp/gym-py-venv/bin/activate
          for d in packages/gym/corpus/repos/python/*/; do
            if [ -f "$d/pyproject.toml" ] || [ -f "$d/setup.py" ]; then
              pip install --quiet -e "$d" || echo "warn: pip install -e $d failed"
            elif [ -f "$d/requirements.txt" ]; then
              pip install --quiet -r "$d/requirements.txt" || echo "warn: requirements install in $d failed"
            fi
          done
          echo "VIRTUAL_ENV=/tmp/gym-py-venv" >> "$GITHUB_ENV"
          echo "/tmp/gym-py-venv/bin" >> "$GITHUB_PATH"

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all workspace packages
        run: pnpm -r build

      - name: Run gym (${{ matrix.language }})
        id: gym-run
        env:
          # rust-analyzer scip and scip-java run build scripts during
          # indexing. Trusted corpora only.
          CODEHUB_ALLOW_BUILD_SCRIPTS: "1"
        run: |
          node packages/gym/dist/cli.js run \
            --corpus "packages/gym/corpus/${{ matrix.language }}/**/*.yaml" \
            --baseline packages/gym/baselines/manifest.jsonl \
            --output /tmp/current.jsonl \
            --language ${{ matrix.language }}

      - name: Upload current manifest on failure
        if: failure() && steps.gym-run.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: gym-manifest-${{ matrix.language }}-${{ github.sha }}
          path: /tmp/current.jsonl
          if-no-files-found: warn
          retention-days: 14

      - name: Comment gate summary on PR regression
        if: github.event_name == 'pull_request' && failure() && steps.gym-run.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const language = '${{ matrix.language }}';
            let summary = '(no manifest emitted)';
            try {
              const raw = fs.readFileSync('/tmp/current.jsonl', 'utf8');
              const records = raw.split('\n').filter(Boolean);
              const rollups = new Map();
              for (const line of records) {
                try {
                  const rec = JSON.parse(line);
                  const toolName = rec.tool?.name ?? '?';
                  const key = `${rec.language ?? '?'}/${toolName}/${rec.request?.kind ?? '?'}`;
                  const prev = rollups.get(key) ?? { n: 0, f1Sum: 0 };
                  if (typeof rec.f1 === 'number') {
                    prev.n += 1;
                    prev.f1Sum += rec.f1;
                    rollups.set(key, prev);
                  }
                } catch {
                  // ignore malformed lines — summary is best-effort
                }
              }
              const lines = [];
              for (const [key, v] of [...rollups.entries()].sort()) {
                const meanF1 = v.n === 0 ? 'n/a' : (v.f1Sum / v.n).toFixed(3);
                lines.push(`- \`${key}\` cases=${v.n} meanF1=${meanF1}`);
              }
              summary = lines.length > 0 ? lines.join('\n') : '(no rollups in manifest)';
            } catch (e) {
              summary = `(could not read /tmp/current.jsonl: ${e.message})`;
            }
            const body = [
              `### Gym regression: \`${language}\``,
              '',
              `The SCIP gym gate failed for the **${language}** matrix cell on commit \`${context.sha.slice(0, 7)}\`.`,
              '',
              'Rollup summary from this run:',
              '',
              summary,
              '',
              `Full manifest artifact: \`gym-manifest-${language}-${context.sha}\` (uploaded on failure).`,
              '',
              'If this regression is intentional, update `packages/gym/baselines/manifest.jsonl` via `mise run gym:baseline` and commit the refresh.',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

  gym-monorepo:
    name: gym (monorepo)
    needs: gym-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - name: Checkout (with fixture submodules)
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install mise-managed toolchain (node, pnpm, python, uv)
        uses: jdx/mise-action@v4

      - name: Install node-gyp on PATH
        run: npm install -g node-gyp@11

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install scip-python + scip-typescript (monorepo exercises both)
        run: |
          npm install -g @sourcegraph/scip-python@${{ env.SCIP_PYTHON_VERSION }}
          npm install -g @sourcegraph/scip-typescript@${{ env.SCIP_TYPESCRIPT_VERSION }}

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all workspace packages
        run: pnpm -r build

      - name: Run gym (monorepo corpus)
        id: gym-run
        run: |
          node packages/gym/dist/cli.js run \
            --corpus "packages/gym/corpus/monorepo/**/*.yaml" \
            --baseline packages/gym/baselines/manifest.jsonl \
            --output /tmp/current.jsonl

      - name: Upload current manifest on failure
        if: failure() && steps.gym-run.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: gym-manifest-monorepo-${{ github.sha }}
          path: /tmp/current.jsonl
          if-no-files-found: warn
          retention-days: 14
