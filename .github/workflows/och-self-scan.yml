name: OpenCodeHub Self-Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "47 6 * * 3"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  self-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      issues: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151  # v4

      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        # Skip @opencodehub/docs — its build runs astro + playwright; the
        # self-scan job only needs the OCH workspace built. Pages.yml owns
        # the docs build.
        run: pnpm --filter '!@opencodehub/docs' -r build

      - name: Analyze repository
        run: pnpm exec node packages/cli/dist/index.js analyze .

      - name: Scan repository (writes .codehub/scan.sarif)
        run: pnpm exec node packages/cli/dist/index.js scan .

      - name: License-tier gate
        id: license
        run: |
          VERDICT=$(pnpm exec node packages/cli/dist/index.js verdict --json 2>/dev/null | jq -r '.gates.license_audit // "ALLOW"')
          echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"

      - name: Open license BLOCK issue
        if: steps.license.outputs.verdict == 'BLOCK'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="OpenCodeHub license_audit returned BLOCK (${GITHUB_REPOSITORY})"
          EXISTING=$(gh issue list --state open --label license --search "$TITLE in:title" --json number --jq '.[0].number // ""')
          if [ -z "$EXISTING" ]; then
            gh issue create \
              --title "$TITLE" \
              --label license,automated \
              --body "Self-scan detected a BLOCK verdict from the license_audit gate. See SARIF artifact attached to this run."
          fi

      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: och-self-scan-sarif
          path: .codehub/scan.sarif

      - name: Upload SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4
        with:
          sarif_file: .codehub/scan.sarif
          category: opencodehub-self
