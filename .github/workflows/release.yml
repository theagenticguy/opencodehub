# OpenCodeHub Release pipeline.
#
# Triggered when a release-please tag is published. Builds every package,
# generates a CycloneDX SBOM, runs the OCH self-scan + analyze + code-pack
# against the released SHA, signs every artifact with Sigstore cosign
# (keyless / OIDC), attests build provenance via actions/attest-build-provenance
# (stored in the GitHub attestations API), and attaches every artifact +
# signature to the GitHub release.
#
# Trigger model:
#
#   release: types: [published]
#     Fires when a release-please-cut release is published. Note: the
#     default GITHUB_TOKEN does NOT fire downstream `release: published`
#     events. To make this path work in the natural release-please flow,
#     either (a) configure `RELEASE_PLEASE_PAT` for release-please-action
#     so the publish identity is a real user, or (b) rely on the
#     `workflow_call` invocation below from release-please.yml. See
#     docs/RELEASE.md and `.erpaval/solutions/conventions/
#     release-published-event-needs-pat-or-inline.md`.
#
#   workflow_call (with `tag` input)
#     release-please.yml invokes this workflow inline after a successful
#     `release_created`, so the artifact pipeline runs even when no PAT
#     is configured.
#
#   workflow_dispatch (with `tag` input)
#     Manual hotfix / re-build path documented in docs/RELEASE.md.
#
# Every job anchors to the released commit SHA so SBOM, attestations, and
# signatures all reference a single immutable hash.

name: Release

on:
  release:
    types: [published]
  workflow_call:
    inputs:
      tag:
        description: "Tag to build artifacts for (must already be created as a release)."
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re)build artifacts for. Must already exist as a release."
        required: true
        type: string

# A release is anchored to one tag. Cancelling in-progress runs on the
# same tag avoids two builds racing to upload assets.
concurrency:
  group: release-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: true

# Top-level: read-only. Per-job grants escalate where strictly required.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # 0. Resolve the tag + commit SHA we're releasing. Every downstream job
  #    threads `needs.resolve.outputs.sha` so SBOM, attestations, and
  #    signatures all reference one immutable hash.
  # ---------------------------------------------------------------------------
  resolve:
    name: Resolve release tag + SHA
    runs-on: ubuntu-latest
    # Only run the package-release pipeline for version-shaped tags. The
    # `release: published` event also fires for non-package releases that
    # merely HOST assets — e.g. the `embed-v1` embedder-weights release
    # (see packages/embedder/src/model-pins.ts) — which must NOT build,
    # sign, or npm-publish anything. release-please tags are `root-v*`,
    # `cli-v*`, or a bare `v*`; `workflow_call`/`workflow_dispatch` pass an
    # explicit tag input and are always allowed.
    if: >-
      github.event_name != 'release'
      || startsWith(github.event.release.tag_name, 'root-v')
      || startsWith(github.event.release.tag_name, 'cli-v')
      || startsWith(github.event.release.tag_name, 'v')
    outputs:
      tag: ${{ steps.t.outputs.tag }}
      sha: ${{ steps.t.outputs.sha }}
    steps:
      - id: t
        env:
          EVT_TAG: ${{ github.event.release.tag_name }}
          IN_TAG: ${{ inputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "${EVT_TAG:-}" ]; then
            TAG="$EVT_TAG"
          elif [ -n "${IN_TAG:-}" ]; then
            TAG="$IN_TAG"
          else
            echo "no tag in event payload or inputs" >&2
            exit 1
          fi
          # Resolve tag -> commit SHA via the GitHub API.
          REF_JSON=$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}")
          SHA=$(echo "$REF_JSON" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['object']['sha'])")
          TYPE=$(echo "$REF_JSON" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['object']['type'])")
          # Annotated tag object -> dereference to the underlying commit.
          if [ "$TYPE" = "tag" ]; then
            SHA=$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${SHA}" --jq '.object.sha')
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Resolved $TAG -> $SHA"

  # ---------------------------------------------------------------------------
  # 1. Build packages, generate SBOM, run OCH self-scan, build code-pack.
  #    All on the released SHA. Outputs a single artifact bundle that the
  #    sign / attest / upload jobs consume.
  # ---------------------------------------------------------------------------
  build:
    name: Build, SBOM, code-pack
    needs: resolve
    runs-on: ubuntu-latest
    outputs:
      pack-sha256: ${{ steps.hashes.outputs.pack }}
      sbom-sha256: ${{ steps.hashes.outputs.sbom }}
      sarif-sha256: ${{ steps.hashes.outputs.sarif }}
    steps:
      - name: Checkout released SHA
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ needs.resolve.outputs.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Provision toolchain (mise)
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d  # v4.2.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        # Skip @opencodehub/docs — its build runs astro + playwright. The
        # release flow only needs the OCH workspace TS packages built; the
        # docs build runs on the dedicated `pages.yml` workflow.
        run: pnpm --filter '!@opencodehub/docs' -r build

      - name: Analyze repository (OCH self-index)
        run: pnpm exec node packages/cli/dist/index.js analyze .

      - name: Self-scan (writes .codehub/scan.sarif)
        run: pnpm exec node packages/cli/dist/index.js scan .

      - name: Generate code-pack
        run: |
          pnpm exec node packages/cli/dist/index.js code-pack . \
            --budget 100000 \
            --tokenizer "openai:o200k_base@tiktoken-0.8.0" \
            --out-dir /tmp/pack

      - name: Tar code-pack
        run: tar -czf opencodehub-pack.tar.gz -C /tmp/pack .

      - name: Generate CycloneDX SBOM
        run: |
          npx -y @cyclonedx/cdxgen@11 \
            -t pnpm \
            -o SBOM.cdx.json \
            --spec-version 1.5 \
            -p

      - name: Stage artifact bundle
        run: |
          mkdir -p artifacts
          cp opencodehub-pack.tar.gz artifacts/
          cp SBOM.cdx.json artifacts/
          if [ -f .codehub/scan.sarif ]; then
            cp .codehub/scan.sarif artifacts/och-scan.sarif
          fi
          ls -la artifacts/

      # Compute per-file SHA-256 once, surfaced as job outputs for the
      # operator's runbook verification commands (docs/RELEASE.md). Build
      # provenance over these artifacts is attested in the `provenance` job
      # via actions/attest-build-provenance, which hashes the files itself —
      # so no base64-subjects bundle is produced here anymore.
      - name: Compute artifact SHA-256 hashes
        id: hashes
        run: |
          set -euo pipefail
          cd artifacts
          PACK=$(sha256sum opencodehub-pack.tar.gz | awk '{print $1}')
          SBOM=$(sha256sum SBOM.cdx.json | awk '{print $1}')
          SARIF=""
          if [ -f och-scan.sarif ]; then
            SARIF=$(sha256sum och-scan.sarif | awk '{print $1}')
          fi
          echo "pack=$PACK" >> "$GITHUB_OUTPUT"
          echo "sbom=$SBOM" >> "$GITHUB_OUTPUT"
          echo "sarif=$SARIF" >> "$GITHUB_OUTPUT"

      - name: Upload artifact bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: release-artifacts
          path: artifacts/
          retention-days: 30
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 2. SLSA build provenance (node24, first-party).
  #
  #    Migrated off slsa-framework/slsa-github-generator (a reusable workflow
  #    pinned at v2.1.0) to actions/attest-build-provenance. Two reasons:
  #
  #      1. node24. The SLSA generator v2.1.0 carries node20 internals
  #         (upload-artifact@v4.6.0, download-artifact@v4.1.8, checkout,
  #         setup-go) and v2.1.0 is its latest release, so the node20→node24
  #         forced cutover (2026-06-16) was unfixable while on it.
  #      2. Resilience. A reusable-workflow-calling job cannot carry
  #         `continue-on-error` (GitHub disallows it), so a generator failure
  #         RED-ed the whole release run and — via `needs` — skipped the npm
  #         publish. attest-build-provenance runs as a normal action step, so
  #         this job takes `continue-on-error: true`: a provenance failure no
  #         longer fails the run, and npm-publish (job 5) is decoupled from it.
  #
  #    Delivery model change: provenance is now stored in the GitHub
  #    attestations API (verify with `gh attestation verify <file> --repo
  #    theagenticguy/opencodehub`) instead of an `intoto.jsonl` asset on the
  #    release + `slsa-verifier`. The signing identity is still this workflow's
  #    OIDC token (SLSA build-provenance predicate). See docs/RELEASE.md §3.2.
  # ---------------------------------------------------------------------------
  provenance:
    name: Build provenance (attestation)
    needs: [resolve, build]
    runs-on: ubuntu-latest
    continue-on-error: true   # provenance is best-effort; never red the run / block publish
    permissions:
      id-token: write         # OIDC token for the attestation signing identity
      contents: read          # read the released tree
      attestations: write     # write the attestation to the GitHub attestations API
    steps:
      - name: Download artifact bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: release-artifacts
          path: artifacts/

      - name: Attest build provenance for every released artifact
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373  # v4.1.1
        with:
          subject-path: |
            artifacts/opencodehub-pack.tar.gz
            artifacts/SBOM.cdx.json
            artifacts/och-scan.sarif

  # ---------------------------------------------------------------------------
  # 3. Cosign keyless signing of every artifact.
  #
  #    Sigstore keyless flow: the workflow's OIDC token authenticates to
  #    Fulcio, Fulcio mints a short-lived cert bound to the workflow's
  #    identity, cosign signs the artifact, the signature + cert + Rekor
  #    log entry land in a `.sig.bundle` file. No long-lived secrets.
  # ---------------------------------------------------------------------------
  sign:
    name: Sign artifacts (cosign keyless)
    needs: [resolve, build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write       # required for OIDC -> Fulcio
      contents: write       # required to upload .sig.bundle to the release
    steps:
      - name: Download artifact bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: release-artifacts
          path: artifacts/

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2
        with:
          cosign-release: "v2.4.1"

      - name: Sign each artifact (keyless, bundle format)
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          set -euo pipefail
          cd artifacts
          for f in opencodehub-pack.tar.gz SBOM.cdx.json och-scan.sarif; do
            if [ -f "$f" ]; then
              echo "Signing $f"
              cosign sign-blob --yes \
                --bundle "$f.sig.bundle" \
                "$f"
            fi
          done
          ls -la

      - name: Upload signed bundle artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: release-artifacts-signed
          path: artifacts/
          retention-days: 30
          if-no-files-found: error

      - name: Attach artifacts + signatures to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.resolve.outputs.tag }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          cd artifacts
          for f in \
            opencodehub-pack.tar.gz \
            opencodehub-pack.tar.gz.sig.bundle \
            SBOM.cdx.json \
            SBOM.cdx.json.sig.bundle \
            och-scan.sarif \
            och-scan.sarif.sig.bundle; do
            if [ -f "$f" ]; then
              gh release upload "$TAG" "$f" --clobber --repo "$GH_REPO"
            fi
          done

  # ---------------------------------------------------------------------------
  # 4. Upload SARIF to GitHub code-scanning at the released SHA so
  #    findings are linked to the tag, not only to `main`.
  # ---------------------------------------------------------------------------
  publish-sarif:
    name: Publish OCH self-scan SARIF
    needs: [resolve, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Download artifact bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: release-artifacts
          path: artifacts/

      - name: Upload SARIF to code scanning
        if: hashFiles('artifacts/och-scan.sarif') != ''
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  # v4
        with:
          sarif_file: artifacts/och-scan.sarif
          category: opencodehub-release
          ref: refs/tags/${{ needs.resolve.outputs.tag }}
          sha: ${{ needs.resolve.outputs.sha }}

  # ---------------------------------------------------------------------------
  # 5. npm publish — OIDC trusted publishing with provenance.
  #
  #    Only `@opencodehub/cli` is published; every other workspace
  #    package is `private: true` and its source is bundled into the CLI
  #    at build time (PR #189), so `pnpm -r publish` skips them. The CLI
  #    has an npm trusted-publisher relationship configured against this
  #    repo + workflow filename, so no NPM_TOKEN is required — the
  #    `id-token: write` permission drives both OIDC auth to npm AND the
  #    Sigstore provenance attestation that ties the published tarball
  #    back to this workflow run + commit SHA. This path is live: run
  #    #176 published 0.6.0 with provenance. pnpm 10.21+ / 11.x supports
  #    OIDC on direct `pnpm publish` (the changeset-publish regression in
  #    pnpm/pnpm#11566 does not apply here). The publish job is gated
  #    `if: vars.OCH_NPM_PUBLISH_ENABLED == 'true'` — that repo variable
  #    is the on/off switch (set to `true` today).
  # ---------------------------------------------------------------------------
  npm-publish:
    name: npm publish (OIDC + provenance)
    # Decoupled from the `provenance` job's result: npm publish generates its
    # OWN Sigstore provenance via `pnpm publish --provenance` and never
    # consumed the SLSA/attestation artifact. We still list `provenance` in
    # `needs` so publish runs AFTER it (ordering), but `!cancelled()` overrides
    # the implicit success() gate so a provenance failure cannot skip publish.
    # The explicit == 'success' clauses re-assert the deps we DO require.
    # (provenance is also continue-on-error, so this is belt-and-suspenders.)
    if: >-
      !cancelled()
      && vars.OCH_NPM_PUBLISH_ENABLED == 'true'
      && needs.resolve.result == 'success'
      && needs.build.result == 'success'
      && needs.sign.result == 'success'
    needs: [resolve, build, sign, provenance]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write       # OIDC token for npm trusted publishing AND provenance
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ needs.resolve.outputs.sha }}
          persist-credentials: false
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d  # v4.2.0
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter '!@opencodehub/docs' -r build
      # Idempotency guard: a stuck/retried release (e.g. the automated chain
      # failed mid-publish and is re-run) must not hard-fail because the version
      # already exists on npm. `pnpm publish` errors on a duplicate version, so
      # short-circuit when the registry already serves this exact version.
      - name: Skip if version already published
        id: published
        run: |
          set -euo pipefail
          NAME=$(node -p "require('./packages/cli/package.json').name")
          VER=$(node -p "require('./packages/cli/package.json').version")
          if npm view "${NAME}@${VER}" version >/dev/null 2>&1; then
            echo "already=true" >> "$GITHUB_OUTPUT"
            echo "::notice::${NAME}@${VER} already on npm — skipping publish (idempotent re-run)."
          else
            echo "already=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish to npm
        if: steps.published.outputs.already == 'false'
        run: pnpm --filter '!@opencodehub/docs' -r publish --provenance --access public --no-git-checks
