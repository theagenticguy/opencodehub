name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v2
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm exec biome ci .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v2
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm -r exec tsc --noEmit

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v2
      - name: Ensure node-gyp is available for native tree-sitter build
        run: npm i -g node-gyp
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r test

  sarif-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v2
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm -F @opencodehub/sarif build
      - run: pnpm -F @opencodehub/sarif run validate-schema

  banned-strings:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash scripts/check-banned-strings.sh

  licenses:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v2
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - name: license allowlist
        run: >
          pnpm exec license-checker-rseidelsohn
          --onlyAllow 'Apache-2.0;MIT;BSD-2-Clause;BSD-3-Clause;ISC;CC0-1.0'
          --excludePrivatePackages
          --production

  osv:
    permissions:
      contents: read
      security-events: write
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.5
    with:
      scan-args: |-
        --lockfile=pnpm-lock.yaml
