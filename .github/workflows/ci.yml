name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm exec biome ci .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Build workspace .d.ts so cross-package types resolve
        run: pnpm -r build
      - run: pnpm -r exec tsc --noEmit

  test:
    # Node 22 = native-opt-in path (OCH_NATIVE_PARSER=1); Node 24 = WASM default
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [22, 24]
    runs-on: ${{ matrix.os }}
    env:
      MISE_NODE_VERSION: ${{ matrix.node-version }}
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - name: Ensure node-gyp is available for native tree-sitter build
        if: matrix.node-version == 22
        run: npm i -g node-gyp
      # Node 22: let native tree-sitter grammars postinstall (scripts enabled)
      # so the OCH_NATIVE_PARSER=1 test path has working N-API bindings.
      # Node 24: skip postinstall — native grammars can't build against the
      # Node 24 V8 ABI yet (tree-sitter/node-tree-sitter#276). WASM default
      # doesn't need the N-API addons on disk.
      - name: Install deps (Node 22, with postinstall)
        if: matrix.node-version == 22
        run: pnpm install --frozen-lockfile
      - name: Install deps (Node 24, ignore-scripts)
        if: matrix.node-version == 24
        run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm -r test
        env:
          OCH_NATIVE_PARSER: ${{ matrix.node-version == 22 && '1' || '' }}

  sarif-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm -F @opencodehub/sarif build
      - run: pnpm -F @opencodehub/sarif run validate-schema

  banned-strings:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash scripts/check-banned-strings.sh

  licenses:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - name: license allowlist
        run: >
          pnpm exec license-checker-rseidelsohn
          --onlyAllow 'Apache-2.0;MIT;BSD-2-Clause;BSD-3-Clause;ISC;CC0-1.0;BlueOak-1.0.0;0BSD'
          --excludePrivatePackages
          --production

  osv:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - name: Install osv-scanner
        run: |
          curl -sL -o /tmp/osv-scanner \
            https://github.com/google/osv-scanner/releases/download/v2.3.5/osv-scanner_linux_amd64
          chmod +x /tmp/osv-scanner
      - name: Scan lockfile (SARIF output)
        run: |
          /tmp/osv-scanner scan source \
            --lockfile=pnpm-lock.yaml \
            --format=sarif \
            --output=results.sarif || true
      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
        if: always()
      - name: Fail on vulnerabilities
        run: /tmp/osv-scanner scan source --lockfile=pnpm-lock.yaml
