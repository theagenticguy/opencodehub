name: Bug report
description: Something in OpenCodeHub is broken or behaving unexpectedly.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. A minimal reproduction saves everyone time.

  - type: input
    id: version
    attributes:
      label: OpenCodeHub version
      placeholder: "e.g. v2.0.0, commit sha, or 'main @ <sha>'"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux (x86_64)
        - Linux (arm64)
        - Windows
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node version
      placeholder: "output of `node --version`"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you expect? What happened instead?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Commands, config, and a small repo (or path to a public one) that triggers the bug.
      render: shell
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / stack trace
      render: shell
