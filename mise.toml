[tools]
node = "22"
pnpm = "11.1.0"
python = "3.12"
uv = "latest"
"npm:node-gyp" = "latest"  # fallback native build for @duckdb/node-api / onnxruntime-node when a platform prebuild is missing (parsing is WASM-only — ADR 0015)
"aqua:betterleaks/betterleaks" = "1.2.0"  # secret scanner — used by analyze + pre-release gate
lefthook = "2.1.8"  # git hooks — must satisfy lefthook.yml min_version (2.1.6); matches root devDep so a stale global mise install can't shadow it

[env]
# Python venv used to be anchored at packages/eval/.venv while the eval
# harness lived in this repo. Post-split the harness lives in
# github.com/theagenticguy/opencodehub-testbed, so core keeps a lightweight
# .venv at the repo root only for ad-hoc `uv run` tasks.
_.python.venv = { path = ".venv", create = true }
NODE_ENV = "development"
FORCE_COLOR = "1"

# ---------------------------------------------------------------------------
# Install / bootstrap
# ---------------------------------------------------------------------------

[tasks.install]
description = "Install all JS deps from the lockfile"
run = "pnpm install --frozen-lockfile"
sources = ["pnpm-lock.yaml", "package.json", "packages/*/package.json"]
outputs = ["node_modules/.pnpm/lock.yaml"]

[tasks."install:update"]
description = "Update lockfile (allow pnpm-lock.yaml to change)"
run = "pnpm install"

[tasks.bootstrap]
description = "Full first-time setup: tools + JS deps"
depends = ["install"]

# ---------------------------------------------------------------------------
# Build
# ---------------------------------------------------------------------------

[tasks.build]
description = "Build all TypeScript packages (excludes @opencodehub/docs — see docs:build)"
depends = ["install"]
# Mirror CI (.github/workflows/ci.yml): @opencodehub/docs runs astro +
# rehype-mermaid + headless-Chromium (Playwright) and is built only by the
# docs owner workflow (pages.yml) / the `docs:build` task here. Excluding it
# keeps `mise run check` a faithful local mirror of the CI merge gate on a
# machine without Playwright browsers installed.
run = "pnpm --filter '!@opencodehub/docs' -r build"
sources = ["packages/*/src/**/*.ts", "packages/*/package.json"]
outputs = ["packages/*/dist/**"]

[tasks."build:cli"]
description = "Build only the codehub CLI"
depends = ["install"]
run = "pnpm --filter @opencodehub/cli build"
sources = ["packages/cli/src/**/*.ts", "packages/cli/package.json"]
outputs = ["packages/cli/dist/**"]

[tasks."build:clean"]
description = "Clean all dist/ and rebuild"
depends = ["clean"]
run = "pnpm -r build"

[tasks.clean]
description = "Remove dist/ and TS build info across every package"
run = "pnpm -r clean"

[tasks."clean:all"]
description = "Remove dist/ plus node_modules (hard reset)"
run = """
pnpm -r clean
rm -rf node_modules packages/*/node_modules
"""

# ---------------------------------------------------------------------------
# CLI install (system-wide)
# ---------------------------------------------------------------------------

[tasks."cli:link"]
description = "Expose `codehub` system-wide via pnpm global link (dev)"
depends = ["build:cli"]
dir = "packages/cli"
run = "pnpm link --global"

[tasks."cli:unlink"]
description = "Remove the global pnpm link for `codehub`"
dir = "packages/cli"
run = "pnpm unlink --global"

[tasks."cli:pack"]
description = "Produce a distributable tarball of the CLI"
depends = ["build:cli"]
dir = "packages/cli"
run = "pnpm pack"
outputs = ["packages/cli/opencodehub-cli-*.tgz"]

[tasks."cli:install-global"]
description = "Install the packed CLI tarball globally with pnpm"
depends = ["cli:pack"]
run = "pnpm add -g ./packages/cli/opencodehub-cli-*.tgz"

[tasks."cli:uninstall-global"]
description = "Remove the globally-installed `codehub` CLI"
run = "pnpm remove -g @opencodehub/cli"

# ---------------------------------------------------------------------------
# Quality gates
# ---------------------------------------------------------------------------

[tasks.test]
description = "Run all package tests (excludes @opencodehub/docs — mirrors CI)"
depends = ["build"]
# Mirror CI: docs has no unit tests and its astro build needs Playwright.
run = "pnpm --filter '!@opencodehub/docs' -r test"

[tasks.lint]
description = "Biome check"
run = "pnpm exec biome check ."

[tasks."lint:fix"]
description = "Biome check with autofix"
run = "pnpm exec biome check --write ."

[tasks.format]
description = "Biome format (write)"
run = "pnpm exec biome format --write ."

[tasks.typecheck]
description = "TypeScript typecheck (no emit) across workspace (excludes @opencodehub/docs — mirrors CI)"
run = "pnpm --filter '!@opencodehub/docs' -r exec tsc --noEmit"

[tasks."docs:build"]
description = "Build the Astro docs site (installs headless Chromium for rehype-mermaid first)"
depends = ["install"]
# The docs build renders mermaid diagrams via rehype-mermaid → Playwright
# headless Chromium. CI does this in pages.yml; locally we install the
# browser on demand so the heavy dep never blocks `mise run check`.
run = """
pnpm --filter @opencodehub/docs exec playwright install chromium
pnpm --filter @opencodehub/docs build
"""

[tasks."banned-strings"]
description = "Verify no banned identifiers leaked in"
run = "bash scripts/check-banned-strings.sh"

[tasks.licenses]
description = "License allowlist check (packages/cli prod deps)"
# Root is `private: true` with no runtime deps post-collapse, so scan from
# packages/cli (where the real third-party runtime deps live) via `--start`.
run = "pnpm exec license-checker-rseidelsohn --start packages/cli --onlyAllow 'Apache-2.0;MIT;BSD-2-Clause;BSD-3-Clause;ISC;CC0-1.0;BlueOak-1.0.0;0BSD' --excludePrivatePackages --production"

[tasks.osv]
description = "OSV vulnerability scan against pnpm-lock.yaml"
run = "osv-scanner scan source --lockfile pnpm-lock.yaml ."

[tasks."sarif:validate"]
description = "Validate emitted SARIF against the zod schema"
depends = ["build"]
run = "pnpm --filter @opencodehub/sarif run validate-schema"

[tasks.check]
description = "Full local CI: lint + typecheck + test + banned-strings"
depends = ["lint", "typecheck", "test", "banned-strings"]

[tasks."check:full"]
description = "Everything check does, plus licenses, OSV, and pack determinism"
depends = ["check", "licenses", "osv", "pack:determinism"]

# ---------------------------------------------------------------------------
# Release / acceptance / smoke
# ---------------------------------------------------------------------------

[tasks.acceptance]
description = "Run the v1.0 Definition-of-Done acceptance gates (all 15)"
depends = ["build"]
run = "bash scripts/acceptance.sh"

[tasks."smoke:mcp"]
description = "Smoke test the MCP server over stdio"
depends = ["build"]
run = "bash scripts/smoke-mcp.sh"

[tasks.commit]
description = "Commitizen-guided conventional commit"
run = "pnpm exec cz"

[tasks.envinfo]
description = "Print tooling versions (for bug reports)"
run = "pnpm exec envinfo --system --binaries --npmPackages --markdown"

# ---------------------------------------------------------------------------
# Gym (differential SCIP indexer) — moved to opencodehub-testbed
# ---------------------------------------------------------------------------
# The gym + corpus + baselines live in
# github.com/theagenticguy/opencodehub-testbed and run nightly against
# @opencodehub/cli@latest. No mise tasks live here any more.

# ---------------------------------------------------------------------------
# Codehub CLI convenience passthroughs
# ---------------------------------------------------------------------------

[tasks.analyze]
description = "Run `codehub analyze` on the current repo"
depends = ["build:cli"]
run = "node packages/cli/dist/index.js analyze"

[tasks.status]
description = "Run `codehub status` to check index staleness"
depends = ["build:cli"]
run = "node packages/cli/dist/index.js status"

[tasks.mcp]
description = "Start the codehub MCP server (stdio)"
depends = ["build:cli"]
run = "node packages/cli/dist/index.js mcp"

# ---------------------------------------------------------------------------
# Dogfood: run the codehub CLI against this repo
# ---------------------------------------------------------------------------
# Use `pnpm exec node packages/cli/dist/index.js` rather than the linked
# `codehub` binary because `pnpm link --global` was removed in pnpm 11.x.
# This invocation matches scripts/pack-determinism-audit.sh and is
# forward-compatible with future pnpm upgrades.

[tasks."pack:determinism"]
description = "Verify codehub code-pack output is byte-identical across runs"
depends = ["build:cli"]
run = "bash scripts/pack-determinism-audit.sh"

[tasks."och:self-analyze"]
description = "Dogfood: run codehub analyze on this repo"
depends = ["build:cli"]
run = "pnpm exec node packages/cli/dist/index.js analyze ."

[tasks."och:self-scan"]
description = "Dogfood: run codehub scan on this repo"
depends = ["build:cli"]
run = "pnpm exec node packages/cli/dist/index.js scan ."

[tasks."och:self-verdict"]
description = "Dogfood: run codehub verdict against origin/main..HEAD"
depends = ["build:cli"]
run = "pnpm exec node packages/cli/dist/index.js verdict --base origin/main --head HEAD"

[tasks."och:self-pack"]
description = "Dogfood: produce a deterministic code-pack of this repo"
depends = ["build:cli"]
run = "pnpm exec node packages/cli/dist/index.js code-pack . --budget 100000 --tokenizer 'openai:o200k_base@tiktoken-0.8.0' --out-dir .codehub/code-pack"
