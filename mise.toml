[tools]
node = "22"
pnpm = "10.33.2"
python = "3.12"
uv = "latest"
"npm:node-gyp" = "latest"  # required to build tree-sitter native bindings during `pnpm install`

[env]
_.python.venv = { path = "packages/eval/.venv", create = true }
NODE_ENV = "development"
FORCE_COLOR = "1"

# ---------------------------------------------------------------------------
# Install / bootstrap
# ---------------------------------------------------------------------------

[tasks.install]
description = "Install all JS deps from the lockfile"
run = "pnpm install --frozen-lockfile"
sources = ["pnpm-lock.yaml", "package.json", "packages/*/package.json"]
outputs = ["node_modules/.pnpm/lock.yaml"]

[tasks."install:update"]
description = "Update lockfile (allow pnpm-lock.yaml to change)"
run = "pnpm install"

[tasks."install:eval"]
description = "Sync Python eval harness env via uv"
dir = "packages/eval"
run = "uv sync"
sources = ["packages/eval/pyproject.toml", "packages/eval/uv.lock"]

[tasks.bootstrap]
description = "Full first-time setup: tools + JS deps + Python eval env"
depends = ["install", "install:eval"]

# ---------------------------------------------------------------------------
# Build
# ---------------------------------------------------------------------------

[tasks.build]
description = "Build all TypeScript packages"
depends = ["install"]
run = "pnpm -r build"
sources = ["packages/*/src/**/*.ts", "packages/*/package.json"]
outputs = ["packages/*/dist/**"]

[tasks."build:cli"]
description = "Build only the codehub CLI"
depends = ["install"]
run = "pnpm --filter @opencodehub/cli build"
sources = ["packages/cli/src/**/*.ts", "packages/cli/package.json"]
outputs = ["packages/cli/dist/**"]

[tasks."build:clean"]
description = "Clean all dist/ and rebuild"
depends = ["clean"]
run = "pnpm -r build"

[tasks.clean]
description = "Remove dist/ and TS build info across every package"
run = "pnpm -r clean"

[tasks."clean:all"]
description = "Remove dist/ plus node_modules (hard reset)"
run = """
pnpm -r clean
rm -rf node_modules packages/*/node_modules
"""

# ---------------------------------------------------------------------------
# CLI install (system-wide)
# ---------------------------------------------------------------------------

[tasks."cli:link"]
description = "Expose `codehub` system-wide via pnpm global link (dev)"
depends = ["build:cli"]
dir = "packages/cli"
run = "pnpm link --global"

[tasks."cli:unlink"]
description = "Remove the global pnpm link for `codehub`"
dir = "packages/cli"
run = "pnpm unlink --global"

[tasks."cli:pack"]
description = "Produce a distributable tarball of the CLI"
depends = ["build:cli"]
dir = "packages/cli"
run = "pnpm pack"
outputs = ["packages/cli/opencodehub-cli-*.tgz"]

[tasks."cli:install-global"]
description = "Install the packed CLI tarball globally with pnpm"
depends = ["cli:pack"]
run = "pnpm add -g ./packages/cli/opencodehub-cli-*.tgz"

[tasks."cli:uninstall-global"]
description = "Remove the globally-installed `codehub` CLI"
run = "pnpm remove -g @opencodehub/cli"

# ---------------------------------------------------------------------------
# Quality gates
# ---------------------------------------------------------------------------

[tasks.test]
description = "Run all package tests"
depends = ["build"]
run = "pnpm -r test"

[tasks."test:eval"]
description = "Run the Python parity/regression eval harness (pytest)"
depends = ["install:eval", "build"]
dir = "packages/eval"
run = "uv run pytest"

[tasks.lint]
description = "Biome check"
run = "pnpm exec biome check ."

[tasks."lint:fix"]
description = "Biome check with autofix"
run = "pnpm exec biome check --write ."

[tasks.format]
description = "Biome format (write)"
run = "pnpm exec biome format --write ."

[tasks.typecheck]
description = "TypeScript typecheck (no emit) across workspace"
run = "pnpm -r exec tsc --noEmit"

[tasks."banned-strings"]
description = "Verify no banned identifiers leaked in"
run = "bash scripts/check-banned-strings.sh"

[tasks.licenses]
description = "License allowlist check (prod deps)"
run = "pnpm exec license-checker-rseidelsohn --onlyAllow 'Apache-2.0;MIT;BSD-2-Clause;BSD-3-Clause;ISC;CC0-1.0;BlueOak-1.0.0;0BSD' --excludePrivatePackages --production"

[tasks.osv]
description = "OSV vulnerability scan against pnpm-lock.yaml"
run = "osv-scanner scan source --lockfile pnpm-lock.yaml ."

[tasks."sarif:validate"]
description = "Validate emitted SARIF against the zod schema"
depends = ["build"]
run = "pnpm --filter @opencodehub/sarif run validate-schema"

[tasks.check]
description = "Full local CI: lint + typecheck + test + banned-strings"
depends = ["lint", "typecheck", "test", "banned-strings"]

[tasks."check:full"]
description = "Everything check does, plus licenses and OSV"
depends = ["check", "licenses", "osv"]

# ---------------------------------------------------------------------------
# Release / acceptance / smoke
# ---------------------------------------------------------------------------

[tasks.acceptance]
description = "Run the v1.0 Definition-of-Done acceptance gates (all 15)"
depends = ["build"]
run = "bash scripts/acceptance.sh"

[tasks."smoke:mcp"]
description = "Smoke test the MCP server over stdio"
depends = ["build"]
run = "bash scripts/smoke-mcp.sh"

[tasks.commit]
description = "Commitizen-guided conventional commit"
run = "pnpm exec cz"

[tasks.envinfo]
description = "Print tooling versions (for bug reports)"
run = "pnpm exec envinfo --system --binaries --npmPackages --markdown"

# ---------------------------------------------------------------------------
# Gym (differential SCIP indexer)
# ---------------------------------------------------------------------------

[tasks.gym]
description = "Run the SCIP-indexer gym against the current baseline"
depends = ["build"]
run = "node packages/gym/dist/cli.js run"

[tasks."gym:baseline"]
description = "Lock a new baseline manifest from the current gym run"
depends = ["build"]
run = "node packages/gym/dist/cli.js baseline"

[tasks."gym:replay"]
description = "Bit-exact replay of a frozen manifest by re-invoking the pinned SCIP indexer"
depends = ["build"]
run = "node packages/gym/dist/cli.js replay"

[tasks."gym:refresh-expected"]
description = "Refresh corpus `expected:` lists from the current manifest.jsonl"
run = "uv run packages/gym/baselines/scripts/refresh-expected.py packages/gym/baselines/manifest.jsonl"

# ---------------------------------------------------------------------------
# Codehub CLI convenience passthroughs
# ---------------------------------------------------------------------------

[tasks.analyze]
description = "Run `codehub analyze` on the current repo"
depends = ["build:cli"]
run = "node packages/cli/dist/index.js analyze"

[tasks.status]
description = "Run `codehub status` to check index staleness"
depends = ["build:cli"]
run = "node packages/cli/dist/index.js status"

[tasks.mcp]
description = "Start the codehub MCP server (stdio)"
depends = ["build:cli"]
run = "node packages/cli/dist/index.js mcp"

# ---------------------------------------------------------------------------
# Docs site (Astro + Starlight)
# ---------------------------------------------------------------------------

[tasks."docs:dev"]
description = "Run the Starlight docs site in dev mode (http://localhost:4321/opencodehub)"
depends = ["install"]
run = "pnpm -F @opencodehub/docs dev"

[tasks."docs:build"]
description = "Build the Starlight docs site (writes to packages/docs/dist)"
depends = ["install"]
run = "pnpm -F @opencodehub/docs build"
sources = ["packages/docs/src/**", "packages/docs/astro.config.mjs", "packages/docs/package.json"]
outputs = ["packages/docs/dist/**"]

[tasks."docs:preview"]
description = "Preview the built docs locally"
depends = ["docs:build"]
run = "pnpm -F @opencodehub/docs preview"
